<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#f5a623"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#fff" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>
  <!-- Envelope icon -->
  <g transform="translate(160, 180)">
    <rect x="0" y="30" width="140" height="100" rx="8" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <polyline points="0,30 70,90 140,30" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <polyline points="0,130 55,85" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
    <polyline points="140,130 85,85" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
  </g>
  <!-- QR code icon -->
  <g transform="translate(160, 360)">
    <rect x="0" y="0" width="140" height="140" rx="8" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <rect x="15" y="15" width="35" height="35" rx="3" fill="#e94560" opacity="0.8"/>
    <rect x="90" y="15" width="35" height="35" rx="3" fill="#e94560" opacity="0.8"/>
    <rect x="15" y="90" width="35" height="35" rx="3" fill="#e94560" opacity="0.8"/>
    <rect x="60" y="60" width="15" height="15" fill="#f5a623" opacity="0.6"/>
    <rect x="90" y="90" width="15" height="15" fill="#f5a623" opacity="0.6"/>
    <rect x="110" y="70" width="15" height="15" fill="#f5a623" opacity="0.6"/>
    <rect x="70" y="95" width="10" height="10" fill="#f5a623" opacity="0.4"/>
    <rect x="110" y="110" width="15" height="15" fill="#f5a623" opacity="0.4"/>
  </g>
  <!-- Title -->
  <text x="380" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="bold" fill="#ffffff">Serienbrief</text>
  <text x="380" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#adb5bd">Mail-merge letters with QR codes</text>
  <text x="380" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#adb5bd">for member data correction</text>
  <!-- Tech badges -->
  <g transform="translate(380, 400)">
    <rect x="0" y="0" width="120" height="36" rx="18" fill="#e94560" opacity="0.2" stroke="#e94560" stroke-width="1"/>
    <text x="60" y="23" font-family="system-ui, sans-serif" font-size="15" fill="#e94560" text-anchor="middle">TypeScript</text>
    <rect x="135" y="0" width="80" height="36" rx="18" fill="#e94560" opacity="0.2" stroke="#e94560" stroke-width="1"/>
    <text x="175" y="23" font-family="system-ui, sans-serif" font-size="15" fill="#e94560" text-anchor="middle">Hono</text>
    <rect x="230" y="0" width="110" height="36" rx="18" fill="#e94560" opacity="0.2" stroke="#e94560" stroke-width="1"/>
    <text x="285" y="23" font-family="system-ui, sans-serif" font-size="15" fill="#e94560" text-anchor="middle">Postgres</text>
    <rect x="355" y="0" width="100" height="36" rx="18" fill="#e94560" opacity="0.2" stroke="#e94560" stroke-width="1"/>
    <text x="405" y="23" font-family="system-ui, sans-serif" font-size="15" fill="#e94560" text-anchor="middle">pdf-lib</text>
  </g>
  <!-- Accent line -->
  <rect x="380" y="190" width="80" height="4" rx="2" fill="url(#accent)"/>
</svg>
